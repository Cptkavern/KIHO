                                    </select>
                                </div>
                                {(selectedAuditStandardId === 'all' ? standards : standards.filter(s => s.id === selectedAuditStandardId)).map(s => (
                                    <div key={s.id} className="bg-white rounded-3xl border shadow-sm overflow-hidden mb-8">
                                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center font-black text-sm uppercase tracking-tight"><span>{s.name}</span> <span className="bg-blue-600 text-white px-5 py-1.5 rounded-xl shadow-lg">Score: {evaluation.find(e => e.id === s.id).currentLevel}</span></div>
                                        <div className="p-6 space-y-8">
                                            {criteria.filter(c => c.standardId === s.id).map(c => (
                                                <div key={c.id} className={`space-y-4 ${!c.active ? 'opacity-40 grayscale' : ''}`}>
                                                    <div className="flex items-center gap-2">
                                                        <button onClick={() => updateCrit(c.id, {active: !c.active})} className="p-2 rounded-lg bg-slate-100 transition-colors hover:bg-slate-200">{c.active ? <Icon name="Eye" /> : <Icon name="EyeOff" />}</button>
                                                        <h4 className="font-black uppercase text-sm tracking-tight text-slate-800">{c.label}</h4>
                                                    </div>
                                                    
                                                    {/* Grille adaptative: 5 colonnes en desktop, 1 colonne en mobile */}
                                                    <div className={`grid ${viewMode === 'mobile' ? 'grid-cols-1' : 'grid-cols-5'} gap-2`}>
                                                        {[0, 1, 2, 3, 4].map(v => (
                                                            <button key={v} onClick={() => updateCrit(c.id, {level: v})} className={`p-3 rounded-2xl border-2 text-left relative flex flex-col gap-2 transition-all ${viewMode === 'mobile' ? 'min-h-auto' : 'min-h-[6rem]'} ${c.level === v ? 'border-blue-600 bg-blue-50 shadow-md scale-[1.02]' : 'border-slate-100 hover:border-slate-200'}`}>
                                                                <div className="flex justify-between items-center">
                                                                    <span className="text-[8px] font-black uppercase text-slate-400">Niv.{v}</span>
                                                                    {c.level === v && <Icon name="CheckCircle2" size={14} className="text-blue-600" />}
                                                                </div>
                                                                <p className="text-[10px] font-bold leading-tight">{v === 0 ? "INITIAL" : c.levelsData[v-1]?.requirement || "..."}</p>
                                                            </button>
                                                        ))}
                                                    </div>

                                                    <div className={`grid ${viewMode === 'mobile' ? 'grid-cols-1' : 'grid-cols-1 md:grid-cols-2'} gap-4`}>
                                                        <div className="relative">
                                                            <div className="flex justify-between items-center mb-1">
                                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Observations terrain</label>
                                                                <button onClick={() => handleAIRewriteComment(c.id)} disabled={aiLoading[`rewrite_${c.id}`] || !c.comment} className={`flex items-center gap-1 text-[9px] font-black text-blue-600 hover:text-blue-800 transition-colors disabled:opacity-50 ${aiLoading[`rewrite_${c.id}`] ? 'animate-pulse' : ''}`}><Icon name="Sparkles" size={12} /> REFORMULER</button>
                                                            </div>
                                                            <textarea className="bg-slate-50 border rounded-xl p-3 text-xs w-full h-24 resize-none outline-none focus:ring-1 focus:ring-blue-500 shadow-inner" placeholder="Observations..." value={c.comment} onChange={e => updateCrit(c.id, {comment: e.target.value})} />
                                                        </div>
                                                        <div className="flex flex-wrap gap-2">
                                                            {c.images.map((img, idx) => (
                                                                <div key={idx} className="relative w-24 h-24 rounded-lg overflow-hidden border shadow-sm">
                                                                    <img src={img} className="w-full h-full object-cover" />
                                                                    <button onClick={() => updateCrit(c.id, {images: c.images.filter((_, i) => i !== idx)})} className="absolute inset-0 bg-red-600/50 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity"><Icon name="X" size={12} className="text-white" /></button>
                                                                </div>
                                                            ))}
                                                            <label className="w-24 h-24 border-2 border-dashed rounded-lg flex items-center justify-center text-slate-300 hover:text-blue-500 cursor-pointer transition-colors"><Icon name="Plus" /><input type="file" className="hidden" accept="image/*" multiple onChange={e => {
                                                                const files = Array.from(e.target.files);
                                                                files.forEach(f => {
                                                                    const r = new FileReader();
                                                                    r.onload = ev => updateCrit(c.id, {images: [...c.images, ev.target.result]});
                                                                    r.readAsDataURL(f);
                                                                });
                                                            }} /></label>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'report' && (() => {
                            const nextMaturityMap = { 'INITIAL': 'reactif', 'RÉACTIF': 'structure', 'STRUCTURÉ': 'maitrise', 'MAÎTRISÉ': 'optimise', 'OPTIMISÉ': null };
                            const nextKey = nextMaturityMap[globalLabel];
                            const nextLabel = MATURITY_STEPS.find(m => m.id === nextKey)?.label || "MAXIMUM";
                            
                            const priorityActions = [];
                            if (nextKey) {
                                criteria.forEach(c => {
                                    const std = standards.find(s => s.id === c.standardId);
                                    if (std && c.active && (std.requirements[nextKey] || 0) > 0 && c.level < std.requirements[nextKey]) {
                                        const actionText = (c.levelsData[std.requirements[nextKey] - 1]?.action || "").trim().toUpperCase();
                                        if (actionText !== "NC" && actionText !== "") { priorityActions.push({ c, std, target: std.requirements[nextKey] }); }
                                    }
                                });
                            }
                            const groupedPriority = priorityActions.reduce((acc, act) => {
                                if (!acc[act.std.id]) acc[act.std.id] = { std: act.std, actions: [] };
                                acc[act.std.id].actions.push(act);
                                return acc;
                            }, {});

                            const otherActions = [];
                            criteria.forEach(c => {
                                const std = standards.find(s => s.id === c.standardId);
                                if (c.active && !priorityActions.some(p => p.c.id === c.id) && c.level < 4) {
                                    const targetLevel = c.level + 1;
                                    const actionText = (c.levelsData[targetLevel - 1]?.action || "").trim().toUpperCase();
                                    if (actionText !== "NC" && actionText !== "") { otherActions.push({ c, std, target: targetLevel }); }
                                }
                            });
                            const groupedOther = otherActions.reduce((acc, act) => {
                                if (!acc[act.std.id]) acc[act.std.id] = { std: act.std, actions: [] };
                                acc[act.std.id].actions.push(act);
                                return acc;
                            }, {});

                            // 1. Calcul des conformités acquises pour la vue Rapport (CORRECTION)
                            const validatedCriteria = [];
                            criteria.forEach(c => {
                                const std = standards.find(s => s.id === c.standardId);
                                if (std && c.active && c.level > 0) {
                                    const currentReq = globalLabelId !== 'initial' ? (std.requirements[globalLabelId] || 0) : 0;
                                    // Filtre strict : le standard doit être requis pour ce niveau, ET le critère doit atteindre ce niveau
                                    if ((globalLabelId === 'initial' || currentReq > 0) && c.level >= currentReq) {
                                        const reqText = (c.levelsData[c.level - 1]?.requirement || "").trim().toUpperCase();
                                        if (reqText !== "" && reqText !== "NC") { 
                                            validatedCriteria.push({ c, std }); 
                                        }
                                    }
                                }
                            });
                            const groupedValidated = validatedCriteria.reduce((acc, item) => {
                                if (!acc[item.std.id]) acc[item.std.id] = { std: item.std, criteria: [] };
                                acc[item.std.id].criteria.push(item.c);
                                return acc;
                            }, {});

                            return (
                                <div className="max-w-4xl mx-auto space-y-8 pb-20">
                                    <div className="bg-white p-8 rounded-2xl border shadow-sm print:hidden flex flex-col md:flex-row justify-between items-center transition-all gap-4">
                                        <div><h2 className="text-xl font-black uppercase tracking-tight">Rapport de Maturité</h2><p className="text-sm text-slate-500 italic">Configurez les infos de l'audit sur le document.</p></div>
                                        <div className="flex flex-wrap gap-3">
                                            <button onClick={handleExportReportExcel} className="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-xl shadow-emerald-100 hover:bg-emerald-700 active:scale-95 transition-all"><Icon name="Download" size={20} /> PLAN EXCEL</button>
                                            <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all"><Icon name="Printer" size={20} /> IMPRIMER / PDF</button>
                                        </div>
                                    </div>
                                    <div id="printable-report" className="bg-white p-12 rounded-lg border border-slate-200 shadow-xl print:shadow-none print:border-none">
                                        <div className="flex flex-col md:flex-row justify-between border-b-4 border-blue-600 pb-8 mb-8 gap-6">
                                            <div className="flex-1">
                                                <h1 className="text-4xl font-black text-slate-900 mb-2 uppercase tracking-tighter">Rapport KIHO</h1>
                                                <p className="text-blue-600 font-black text-xs tracking-[0.3em] uppercase">Performance & Management</p>
                                            </div>
                                            <div className="w-full md:w-auto text-left md:text-right font-black uppercase space-y-1">
                                                <div className="flex flex-col md:items-end">
                                                    <div className="flex items-center md:justify-end gap-2 text-slate-400 text-[10px] tracking-widest font-bold">FILIALE</div>
                                                    <input value={reportInfo.filiale} placeholder="Filiale" onChange={e => setReportInfo({...reportInfo, filiale: e.target.value})} className="text-sm md:text-right bg-blue-50/30 print:bg-transparent border-0 font-black focus:ring-0 w-full p-1 rounded" />
                                                </div>
                                                <div className="flex flex-col md:items-end">
                                                    <div className="flex items-center md:justify-end gap-2 text-slate-400 text-[10px] tracking-widest font-bold uppercase">Site & Périmètre</div>
                                                    <div className="flex flex-col md:flex-row md:items-center gap-1">
                                                        <input value={reportInfo.site} placeholder="Site" onChange={e => setReportInfo({...reportInfo, site: e.target.value})} className="text-sm md:text-right bg-blue-50/30 print:bg-transparent border-0 font-black focus:ring-0 p-1 rounded" />
                                                        <span className="hidden md:inline opacity-30 px-1">/</span>
                                                        <input value={reportInfo.perimetre} placeholder="Dépôt..." onChange={e => setReportInfo({...reportInfo, perimetre: e.target.value})} className="text-sm md:text-right bg-blue-50/30 print:bg-transparent border-0 font-black focus:ring-0 p-1 rounded" />
                                                    </div>
                                                </div>
                                                <div className="flex flex-col md:items-end pt-2">
                                                    <div className="flex items-center md:justify-end gap-2 text-slate-400 text-[10px] tracking-widest font-bold uppercase">Dates</div>
                                                    <div className="flex items-center gap-1 md:justify-end text-[10px] font-black">
                                                        <input type="date" value={reportInfo.dateDebut} onChange={e => setReportInfo({...reportInfo, dateDebut: e.target.value})} className="bg-blue-50/30 print:bg-transparent border-0 font-black focus:ring-0 p-1 rounded text-[10px] uppercase w-32" />
                                                        <span className="opacity-40">→</span>
                                                        <input type="date" value={reportInfo.dateFin} onChange={e => setReportInfo({...reportInfo, dateFin: e.target.value})} className="bg-blue-50/30 print:bg-transparent border-0 font-black focus:ring-0 p-1 rounded text-[10px] uppercase w-32" />
                                                    </div>
                                                </div>
                                                <div className="flex flex-col md:items-end pt-2">
                                                    <div className="flex items-center md:justify-end gap-2 text-slate-400 text-[10px] tracking-widest font-bold uppercase">Auditeur</div>
                                                    <input value={reportInfo.auditeur} placeholder="Auditeur" onChange={e => setReportInfo({...reportInfo, auditeur: e.target.value})} className="text-[11px] md:text-right bg-blue-50/30 print:bg-transparent border-0 font-black focus:ring-0 w-full p-1 rounded italic" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                                            <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 border-b pb-1 tracking-widest">Analyse par Standard</h4>
                                                <div className="space-y-3">
                                                    {evaluation.map(s => (
                                                        <div key={s.id} className="flex items-center gap-2">
                                                            <span className="text-[8px] font-bold w-32 uppercase truncate text-slate-600">{s.name}</span>
                                                            <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden shadow-inner"><div className={`h-full ${s.isTargetMet ? 'bg-green-600' : 'bg-blue-600'}`} style={{width: `${(s.currentLevel/4)*100}%`}}></div></div>
                                                            <span className="text-[8px] font-black text-blue-600">Niv.{s.currentLevel}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bg-blue-600 text-white p-8 rounded-3xl flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden">
                                                <Icon name="Award" size={48} className="mb-2 relative z-10" />
                                                <p className="text-[10px] font-bold opacity-70 uppercase mb-1 tracking-widest relative z-10">Score Global Actuel</p>
                                                <h2 className="text-4xl font-black uppercase tracking-tighter relative z-10">{globalLabel}</h2>
                                                {nextKey && <div className="mt-4 px-4 py-1.5 bg-white/20 rounded-full text-[9px] font-black uppercase tracking-widest relative z-10">Objectif : {nextLabel}</div>}
                                            </div>
                                        </div>

                                        <div className="space-y-16">
                                            <section className="break-inside-avoid-page">
                                                <h3 className="text-lg font-black border-b-4 border-green-500 pb-1 mb-6 uppercase flex items-center gap-2"><Icon name="ShieldCheck" className="text-green-500" /> I. Bilan de Conformité - Niveau {globalLabel} acquis</h3>
                                                {validatedCriteria.length === 0 ? <p className="text-xs text-slate-400 italic">Aucune conformité documentée.</p> : (
                                                    Object.values(groupedValidated).map(group => (
                                                        <div key={group.std.id} className="mb-8 break-inside-avoid">
                                                            <div className="bg-green-50 px-4 py-2 rounded-xl mb-4 border-l-4 border-green-500 shadow-sm"><h4 className="text-[10px] font-black text-green-700 uppercase tracking-tight">{group.std.name}</h4></div>
                                                            <div className="space-y-4">
                                                                {group.criteria.map((c, i) => (
                                                                    <div key={i} className="ml-4 p-5 border rounded-3xl bg-white shadow-sm border-l-8 border-l-green-100 break-inside-avoid">
                                                                        <div className="flex gap-4">
                                                                            <div className="w-10 h-10 bg-green-100 text-green-600 flex items-center justify-center rounded-xl font-black border-b-4 border-green-200 shrink-0 shadow-sm">{c.level}</div>
                                                                            <div className="flex-1">
                                                                                <p className="font-black uppercase text-[10px] mb-2 text-slate-800 tracking-tight leading-tight">{c.label}</p>
                                                                                <div className="p-3 bg-green-50/30 border border-green-100 rounded-xl mb-2">
                                                                                    <p className="text-[10px] italic leading-relaxed text-slate-700">"{c.levelsData[c.level-1]?.requirement}"</p>
                                                                                </div>
                                                                                <ReportEvidence item={c} />
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </section>

                                            <section className="break-inside-avoid-page">
                                                <div className="flex items-center justify-between border-b-4 border-orange-500 pb-1 mb-6">
                                                    <h3 className="text-lg font-black uppercase flex items-center gap-2"><Icon name="Target" className="text-orange-500" /> II. Plan de Labellisation</h3>
                                                    <span className="bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-[10px] font-black uppercase shadow-sm">Objectif : {nextLabel}</span>
                                                </div>
                                                {priorityActions.length === 0 ? <p className="text-xs text-slate-400 italic">Objectifs atteints.</p> : (
                                                    Object.values(groupedPriority).map(group => (
                                                        <div key={group.std.id} className="mb-8 break-inside-avoid">
                                                            <div className="bg-orange-50 px-4 py-2 rounded-xl mb-4 border-l-4 border-orange-500 shadow-sm"><h4 className="text-xs font-black text-orange-700 uppercase">{group.std.name}</h4></div>
                                                            <div className="space-y-8">
                                                                {group.actions.map((a, i) => (
                                                                    <div key={i} className="ml-4 p-6 border rounded-3xl bg-white shadow-sm break-inside-avoid">
                                                                        <div className="flex gap-4">
                                                                            <div className="w-10 h-10 bg-orange-100 text-orange-600 flex items-center justify-center rounded-xl font-black border-b-4 border-orange-200 shrink-0 shadow-sm">{a.target}</div>
                                                                            <div className="flex-1">
                                                                                <p className="font-black uppercase text-xs mb-3 text-slate-800 leading-tight tracking-tight">{a.c.label}</p>
                                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                                    <div className="p-4 bg-white border border-slate-100 rounded-2xl shadow-inner"><p className="text-[8px] font-black text-slate-400 uppercase mb-2 tracking-widest">Exigence attendue</p><p className="text-[10px] italic text-slate-600">"{a.c.levelsData[a.target-1]?.requirement}"</p></div>
                                                                                    <div className="p-4 bg-blue-50 border border-blue-100 rounded-2xl shadow-sm"><p className="text-[8px] font-black text-blue-500 uppercase mb-2 tracking-widest">Action corrective</p><p className="text-[10px] font-bold text-slate-800 italic">"{a.c.levelsData[a.target-1]?.action}"</p></div>
                                                                                </div>
                                                                                {a.target === 1 && <ReportEvidence item={a.c} />}
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </section>

                                            <section className="break-inside-avoid-page">
                                                <h3 className="text-lg font-black border-b-4 border-blue-500 pb-1 mb-6 uppercase flex items-center gap-2"><Icon name="TrendingUp" className="text-blue-500" /> III. Plan de Progression (+1 Niveau)</h3>
                                                {otherActions.length === 0 ? <p className="text-xs text-slate-400 italic">Aucune action de progrès.</p> : (
                                                    Object.values(groupedOther).map(group => (
                                                        <div key={group.std.id} className="mb-6 break-inside-avoid">
                                                            <div className="bg-slate-100 px-4 py-2 rounded-xl mb-3 border-l-4 border-blue-600 shadow-sm"><h4 className="text-[10px] font-black text-slate-700 uppercase">{group.std.name}</h4></div>
                                                            <div className="space-y-4">
                                                                {group.actions.map((a, i) => (
                                                                    <div key={i} className="ml-4 p-5 border rounded-3xl border-l-8 border-l-blue-100 bg-white shadow-sm break-inside-avoid transition-all">
                                                                        <div className="flex gap-4">
                                                                            <div className="w-8 h-8 bg-blue-50 text-blue-600 flex items-center justify-center rounded-lg font-black shrink-0 shadow-sm">{a.target}</div>
                                                                            <div className="flex-1">
                                                                                <p className="font-black uppercase text-[11px] text-slate-800 mb-2 leading-tight tracking-tight">{a.c.label}</p>
                                                                                <p className="text-[10px] text-slate-500 italic mb-2 leading-relaxed"><span className="font-black text-blue-600 uppercase text-[9px]">Action :</span> {a.c.levelsData[a.target-1]?.action}</p>
                                                                                <ReportEvidence item={a.c} hidePhotos={true} />
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </section>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {activeTab === 'rules' && (
                            <div className="space-y-8 pb-20">
                                <div className="bg-white p-6 rounded-2xl border shadow-sm overflow-hidden animate-in fade-in duration-500">
                                    <h3 className="font-black uppercase mb-4 text-blue-600 tracking-tight flex items-center gap-2">Matrice des Objectifs par Label</h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="text-[10px] font-black uppercase border-b text-slate-400">
                                                <tr><th className="p-2 border-r">Standard</th>{MATURITY_STEPS.map(m => <th key={m.id} className="p-2 text-center border-r last:border-0">{m.label}</th>)}</tr>
                                            </thead>
                                            <tbody>
                                                {standards.map(s => (
                                                    <tr key={s.id} className="border-b last:border-0 hover:bg-slate-50 transition-colors">
                                                        <td className="p-2 text-[10px] font-bold uppercase truncate max-w-[200px] border-r">{s.name}</td>
                                                        {MATURITY_STEPS.map((m, idx) => (
                                                            <td key={m.id} className={`p-2 text-center ${idx < 3 ? 'border-r' : ''}`}>
                                                                <input type="number" min="0" max="4" value={s.requirements[m.id] || 0} onChange={e => updateRequirement(s.id, m.id, e.target.value)} className="w-12 border rounded-lg text-center font-black p-1 text-[10px] focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-inner" />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col md:flex-row gap-4 justify-between items-center transition-all">
                                    <h3 className="font-black uppercase tracking-tight text-lg">Référentiel Critères</h3>
                                    <div className="flex flex-wrap gap-2">
                                        <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx" onChange={handleFileUpload} />
                                        <button onClick={() => fileInputRef.current?.click()} className="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-xl text-[10px] font-black flex items-center gap-2 shadow-sm uppercase hover:bg-slate-200 transition-all active:scale-95"><Icon name="Upload" size={16} /> Importer Référentiel</button>
                                        <button onClick={handleExportRules} className="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-xl text-[10px] font-black flex items-center gap-2 shadow-sm uppercase hover:bg-slate-200 transition-all active:scale-95"><Icon name="Download" size={16} /> Exporter Référentiel</button>
                                        <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl border border-slate-200 shadow-inner">
                                            <input className="bg-white rounded-lg px-4 py-2 text-[10px] w-52 border-0 outline-none font-bold uppercase" placeholder="Standard..." value={newStandardName} onChange={e => setNewStandardName(e.target.value)} />
                                            <button onClick={() => addStandard(newStandardName)} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-black text-xs uppercase shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95"><Icon name="Plus" size={18} /></button>
                                        </div>
                                    </div>
                                </div>
                                {standards.map(s => (
                                    <div key={s.id} className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm mb-8">
                                        <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center font-black uppercase text-xs tracking-tight">
                                            <input value={s.name} onChange={e => setStandards(p => p.map(st => st.id === s.id ? {...st, name: e.target.value} : st))} className="bg-transparent border-b-2 border-transparent focus:border-blue-500 focus:outline-none w-full p-1 transition-all" />
                                            <button onClick={() => deleteStandard(s.id)} className="text-slate-300 hover:text-red-500 transition-all ml-4 p-2 rounded-lg hover:bg-red-50"><Icon name="Trash2" size={20} /></button>
                                        </div>
                                        <div className="p-6 space-y-8">
                                            {criteria.filter(c => c.standardId === s.id).map(c => (
                                                <div key={c.id} className="p-6 bg-slate-50/50 rounded-2xl border border-slate-100 relative group transition-all hover:bg-white hover:shadow-md">
                                                    <div className="flex items-center justify-between mb-6">
                                                        <input value={c.label} onChange={e => updateCrit(c.id, {label: e.target.value})} className="flex-1 text-sm font-black uppercase bg-transparent border-b-2 border-transparent focus:border-blue-300 focus:outline-none tracking-tight p-1" />
                                                        <button onClick={() => deleteCriterion(c.id)} className="text-slate-300 hover:text-red-500 transition-opacity ml-4 p-1 rounded-lg hover:bg-red-50"><Icon name="X" size={20} /></button>
                                                    </div>
                                                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                                                        {[0, 1, 2, 3].map(i => (
                                                            <div key={i} className="bg-white p-5 rounded-2xl border border-slate-200 space-y-4 shadow-sm">
                                                                <span className="text-[9px] font-black bg-blue-50 text-blue-600 px-2.5 py-1 rounded-lg uppercase shadow-sm">Niveau {i+1}</span>
                                                                <div className="space-y-2">
                                                                    <div className="flex justify-between items-center px-1">
                                                                        <label className="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none">Exigence</label>
                                                                        <button onClick={() => handleAIRewriteInRules(c.id, i, 'requirement')} disabled={aiLoading[`rewrite_rules_${c.id}_${i}_requirement`] || !c.levelsData[i]?.requirement} className={`flex items-center gap-1 text-[8px] font-black text-blue-600 hover:text-blue-800 disabled:opacity-30 p-1 rounded-md hover:bg-blue-50 transition-all ${aiLoading[`rewrite_rules_${c.id}_${i}_requirement`] ? 'animate-pulse' : ''}`}><Icon name="Sparkles" size={10} /> CORRIGER</button>
                                                                    </div>
                                                                    <textarea className="w-full text-[10px] font-bold h-20 resize-none border-0 bg-slate-50 p-2.5 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none shadow-inner" placeholder="..." value={c.levelsData[i]?.requirement} onChange={e => {
                                                                        const next = [...c.levelsData]; next[i] = {...next[i], requirement: e.target.value};
                                                                        updateCrit(c.id, {levelsData: next});
                                                                    }} />
                                                                </div>
                                                                <div className="space-y-2">
                                                                    <div className="flex justify-between items-center px-1">
                                                                        <label className="text-[8px] font-black text-blue-400 uppercase tracking-widest leading-none">Action terrain</label>
                                                                        <button onClick={() => handleAIRewriteInRules(c.id, i, 'action')} disabled={aiLoading[`rewrite_rules_${c.id}_${i}_action`] || !c.levelsData[i]?.action} className={`flex items-center gap-1 text-[8px] font-black text-blue-600 hover:text-blue-800 disabled:opacity-30 p-1 rounded-md hover:bg-blue-50 transition-all ${aiLoading[`rewrite_rules_${c.id}_${i}_action`] ? 'animate-pulse' : ''}`}><Icon name="Sparkles" size={10} /> CORRIGER</button>
                                                                    </div>
                                                                    <textarea className="w-full text-[10px] font-bold h-20 resize-none border-0 bg-blue-50/20 p-2.5 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none shadow-inner italic" placeholder="..." value={c.levelsData[i]?.action} onChange={e => {
                                                                        const next = [...c.levelsData]; next[i] = {...next[i], action: e.target.value};
                                                                        updateCrit(c.id, {levelsData: next});
                                                                    }} />
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={() => addCriterion(s.id)} className="w-full py-5 border-2 border-dashed border-slate-200 rounded-3xl text-slate-300 font-black uppercase text-[11px] hover:border-blue-500 hover:text-blue-500 hover:bg-blue-50 transition-all flex items-center justify-center gap-3"><Icon name="Plus" size={20} /> Ajouter un critère</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
