<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIHO GESTION DU TEMPS</title>
    <!-- Bibliothèques -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Nunito:wght@800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .font-nunito { font-family: 'Nunito', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Styles Drag & Drop */
        .drop-target { background-color: rgba(0, 91, 99, 0.08) !important; border: 2px dashed #005B63 !important; }
        .task-card { cursor: grab; transition: all 0.2s ease; }
        .task-card:active { cursor: grabbing; }
        
        .active-task-ring { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const KIHO_GREEN = "#005B63";
        const LOGO_URL = "https://commons.wikimedia.org/wiki/Special:FilePath/Keolis_2017_logo.svg";

        function App() {
            const [isMobileView, setIsMobileView] = useState(window.innerWidth < 768);
            const [showWelcomeModal, setShowWelcomeModal] = useState(true);
            const [helpModal, setHelpModal] = useState(null); // État pour la fenêtre d'aide (collect, prioritize, plan, ou null)
            const [currentStep, setCurrentStep] = useState('collect'); 
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // État pour savoir si la nouvelle tâche à ajouter est quotidienne
            const [newTaskIsDaily, setNewTaskIsDaily] = useState(false);

            // Tâches avec la propriété 'isDaily' et 'days' (tableau au lieu d'une valeur unique)
            const [tasks, setTasks] = useState([
                { id: 1, title: "EXEMPLE : POINT HEBDO", urgent: true, important: true, classified: true, isDaily: false, days: [], order: 0 },
                { id: 2, title: "EXEMPLE : VÉRIFICATION MATINALE", urgent: false, important: true, classified: true, isDaily: true, days: [], order: 1 }
            ]);
            const [activeDay, setActiveDay] = useState(0);
            const [draggedTaskId, setDraggedTaskId] = useState(null);
            
            const fileInputRef = useRef(null);

            const days = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];

            useEffect(() => {
                const handleResize = () => setIsMobileView(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const addTask = (title) => {
                if (!title.trim()) return;
                setTasks([...tasks, { 
                    id: Date.now(), 
                    title, 
                    urgent: false, 
                    important: false, 
                    classified: false, 
                    order: tasks.length, 
                    isDaily: newTaskIsDaily,
                    days: [] 
                }]);
                setNewTaskIsDaily(false); // Réinitialise le bouton quotidien après ajout
            };

            const deleteTask = (id) => setTasks(tasks.filter(x => x.id !== id));

            const onDragStart = (id) => setDraggedTaskId(id);
            
            const onDropOnQuadrant = (urgent, important) => {
                if (!draggedTaskId) return;
                setTasks(prev => prev.map(t => 
                    t.id === draggedTaskId ? { ...t, urgent, important, classified: true, order: Date.now() } : t
                ));
                setDraggedTaskId(null);
            };

            const onReorder = (targetId, e) => {
                e.stopPropagation();
                if (!draggedTaskId || draggedTaskId === targetId) return;
                
                const draggedTask = tasks.find(t => t.id === draggedTaskId);
                const targetTask = tasks.find(t => t.id === targetId);

                if (draggedTask.urgent !== targetTask.urgent || 
                    draggedTask.important !== targetTask.important || 
                    draggedTask.classified !== targetTask.classified) return;

                const newTasks = [...tasks].sort((a, b) => a.order - b.order);
                const draggedIdx = newTasks.findIndex(t => t.id === draggedTaskId);
                newTasks.splice(draggedIdx, 1);
                
                const targetIdx = newTasks.findIndex(t => t.id === targetId);
                newTasks.splice(targetIdx, 0, draggedTask);

                setTasks(newTasks.map((t, i) => ({ ...t, order: i })));
                setDraggedTaskId(null);
            };

            // Fonction étendue pour gérer plusieurs jours par tâche
            const planTask = (id, targetDay) => {
                setTasks(tasks.map(t => {
                    if (t.id === id) {
                        if (targetDay === 'all') return { ...t, days: [0, 1, 2, 3, 4] }; // Toute la semaine
                        
                        if (t.isDaily) {
                            // Ajoute le jour sans effacer les autres, en évitant les doublons
                            return { ...t, days: Array.from(new Set([...t.days, targetDay])) };
                        } else {
                            // Remplace le jour unique
                            return { ...t, days: [targetDay] };
                        }
                    }
                    return t;
                }));
                setDraggedTaskId(null);
            };

            const removeTaskFromDay = (id, dayToRemove) => {
                setTasks(tasks.map(t => {
                    if (t.id === id) {
                        return { ...t, days: t.days.filter(d => d !== dayToRemove) };
                    }
                    return t;
                }));
            };

            const getTaskColor = (task) => {
                if (!task.classified) return "bg-white border-slate-100";
                if (task.important && task.urgent) return "bg-rose-100 border-rose-200 text-rose-800";
                if (task.important && !task.urgent) return "bg-blue-100 border-blue-200 text-blue-800";
                if (!task.important && task.urgent) return "bg-amber-100 border-amber-200 text-amber-800";
                return "bg-slate-200 border-slate-300 text-slate-700";
            };

            const exportTasks = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "kiho_sauvegarde.json");
                document.body.appendChild(downloadAnchorNode); 
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                setIsMenuOpen(false);
            };

            const triggerImport = () => {
                if(fileInputRef.current) fileInputRef.current.click();
            };

            const handleImport = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedTasks = JSON.parse(e.target.result);
                        if (Array.isArray(importedTasks)) setTasks(importedTasks);
                    } catch (error) {
                        console.error("Erreur de lecture du fichier JSON", error);
                    }
                };
                reader.readAsText(file);
                setIsMenuOpen(false);
                event.target.value = null; // Reset de l'input pour pouvoir réimporter le même fichier
            };

            const tabs = [
                { id: 'collect', label: '1. IDENTIFIER' },
                { id: 'prioritize', label: '2. PRIORISER' },
                { id: 'plan', label: '3. PLANIFIER VOTRE SEMAINE' }
            ];

            const TaskCard = ({ task, showPriority = false }) => (
                <div 
                    draggable
                    onDragStart={() => onDragStart(task.id)}
                    onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); }}
                    onDrop={(e) => onReorder(task.id, e)}
                    className={`task-card p-3 border rounded-xl shadow-sm mb-2 flex justify-between items-center group animate-in zoom-in-95 ${showPriority ? getTaskColor(task) : 'bg-white border-slate-100 text-slate-700'}`}
                >
                    <span className="text-[11px] font-bold truncate pr-2 uppercase flex items-center gap-1.5">
                        {task.isDaily && <Icon name="repeat" size={12} className="text-blue-500 shrink-0" />}
                        <span className="truncate">{task.title}</span>
                    </span>
                    <button onClick={() => deleteTask(task.id)} className="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                        <Icon name="trash-2" size={14}/>
                    </button>
                </div>
            );

            // Filtrage du backlog pour l'agenda
            const backlogTasks = tasks.filter(t => 
                t.classified && 
                (t.important || t.urgent) && 
                (!t.isDaily ? t.days.length === 0 : t.days.length < 5)
            ).sort((a, b) => a.order - b.order);

            return (
                <div className="flex flex-col h-screen bg-white text-slate-900 overflow-hidden">
                    
                    {/* --- HEADER --- */}
                    <header className="sticky top-0 z-40 w-full bg-white border-b border-slate-200 shadow-sm px-4 h-16 flex items-center justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <img 
                                src={LOGO_URL} 
                                alt="Keolis" 
                                style={{ height: '22px', width: 'auto', objectFit: 'contain' }}
                                onError={(e) => {
                                    if (!e.target.dataset.failed) {
                                        e.target.dataset.failed = true;
                                        e.target.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Keolis_2017_logo.svg/512px-Keolis_2017_logo.svg.png";
                                    }
                                }}
                            />
                            <div className="w-px h-6 bg-slate-200"></div>
                            <div className="font-nunito uppercase font-black tracking-tighter flex items-center text-sm sm:text-lg leading-none">
                                <span style={{ color: KIHO_GREEN }} className="mr-1.5">KIHO</span>
                                <span className="text-blue-600">GESTION DU TEMPS</span>
                            </div>
                        </div>

                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 text-slate-500 hover:bg-slate-50 rounded-xl transition-colors">
                            <Icon name="menu" size={24} />
                        </button>
                        {isMenuOpen && (
                            <div className="absolute right-4 top-14 w-60 bg-white border border-slate-200 rounded-2xl shadow-2xl z-50 p-2 space-y-1 animate-in slide-in-from-top-2">
                                <input 
                                    type="file" 
                                    accept=".json" 
                                    style={{ display: 'none' }} 
                                    ref={fileInputRef} 
                                    onChange={handleImport} 
                                />
                                <button onClick={triggerImport} className="w-full flex items-center gap-3 px-3 py-2.5 text-xs font-bold text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                                    <Icon name="download" size={16} className="text-blue-500"/> Importer
                                </button>
                                <button onClick={exportTasks} className="w-full flex items-center gap-3 px-3 py-2.5 text-xs font-bold text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                                    <Icon name="upload" size={16} className="text-green-500"/> Exporter
                                </button>
                                <div className="h-px bg-slate-100 my-1"></div>
                                <button onClick={() => {setTasks([]); setIsMenuOpen(false);}} className="w-full flex items-center gap-3 px-3 py-2.5 text-xs font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                                    <Icon name="refresh-ccw" size={16}/> Réinitialiser
                                </button>
                                <div className="h-px bg-slate-100 mt-2 mb-1"></div>
                                <div className="text-center py-2">
                                    <p className="text-[8px] font-black uppercase tracking-widest text-slate-400">Concepteur :</p>
                                    <p className="text-[10px] font-bold text-slate-600">D.ABLANCOURT</p>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* --- NAVIGATION --- */}
                    <nav className="w-full bg-white border-b border-slate-100 px-4 flex justify-center sm:justify-start gap-1 sm:gap-6 shrink-0 h-14">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setCurrentStep(tab.id)}
                                className={`flex items-center px-4 h-full relative font-nunito font-black text-[10px] sm:text-xs tracking-wider uppercase transition-all ${currentStep === tab.id ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                <span>{tab.label}</span>
                                {currentStep === tab.id && <div className="absolute bottom-0 left-0 right-0 h-1 bg-blue-600 rounded-t-full"></div>}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 overflow-hidden relative" onClick={() => setIsMenuOpen(false)}>
                        
                        {/* 1. IDENTIFIER */}
                        {currentStep === 'collect' && (
                            <div className="h-full flex flex-col p-4 sm:p-8 max-w-3xl mx-auto space-y-6 overflow-y-auto no-scrollbar animate-in fade-in">
                                <div className="shrink-0 flex justify-between items-start">
                                    <div>
                                        <h2 className="text-2xl font-black tracking-tight text-slate-800 font-nunito">1. Identifier</h2>
                                        <p className="text-slate-500 text-sm">Listez toutes vos missions avant de les qualifier.</p>
                                    </div>
                                    <button onClick={() => setHelpModal('collect')} className="p-2 text-blue-600 bg-blue-50 rounded-full hover:bg-blue-100 transition-colors" title="Aide">
                                        <Icon name="info" size={20} />
                                    </button>
                                </div>
                                <div className="flex gap-2 p-1.5 bg-slate-50 border border-slate-200 rounded-2xl focus-within:ring-2 focus-within:ring-blue-600 transition-all shadow-inner">
                                    <button 
                                        onClick={() => setNewTaskIsDaily(!newTaskIsDaily)}
                                        className={`p-2 rounded-xl transition-colors flex items-center justify-center ${newTaskIsDaily ? 'bg-blue-100 text-blue-600 shadow-sm' : 'text-slate-400 hover:bg-slate-200'}`}
                                        title="Tâche quotidienne"
                                    >
                                        <Icon name="repeat" size={18} />
                                    </button>
                                    <input id="tInput" type="text" placeholder={newTaskIsDaily ? "Ajouter une mission QUOTIDIENNE..." : "Ajouter une mission..."} className="flex-1 p-3 text-sm outline-none bg-transparent" onKeyDown={e => e.key === 'Enter' && (addTask(e.target.value), e.target.value='')} />
                                    <button onClick={() => {const i = document.getElementById('tInput'); addTask(i.value); i.value=''}} className="bg-[#005B63] text-white px-4 sm:px-6 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Ajouter</button>
                                </div>
                                <div className="space-y-2 pb-10">
                                    {tasks.filter(t => !t.classified).sort((a, b) => a.order - b.order).map(t => <TaskCard key={t.id} task={t} />)}
                                </div>
                            </div>
                        )}

                        {/* 2. PRIORISER */}
                        {currentStep === 'prioritize' && (
                            <div className="h-full flex flex-col lg:flex-row p-4 sm:p-6 gap-6 overflow-hidden animate-in fade-in">
                                <div className="w-full lg:w-1/4 flex flex-col space-y-4 shrink-0 overflow-hidden">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">À qualifier</h3>
                                        <button onClick={() => setHelpModal('prioritize')} className="p-1.5 text-blue-600 bg-blue-50 rounded-full hover:bg-blue-100 transition-colors" title="Aide">
                                            <Icon name="info" size={14} />
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-2 bg-slate-50 rounded-2xl border border-slate-100 shadow-inner no-scrollbar">
                                        {tasks.filter(t => !t.classified).sort((a, b) => a.order - b.order).map(t => <TaskCard key={t.id} task={t} />)}
                                    </div>
                                </div>
                                <div className="flex-1 flex flex-col h-full overflow-hidden">
                                    {/* Axe X (Urgence) */}
                                    <div className="h-8 flex justify-between items-center relative pl-8 shrink-0">
                                        <div className="absolute left-8 right-0 h-px bg-slate-200 top-1/2 -translate-y-1/2"></div>
                                        <div className="z-10 bg-white pr-4 flex items-center">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Très urgent</span>
                                        </div>
                                        <div className="z-10 bg-white pl-4 flex items-center gap-2">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Moins urgent</span>
                                            <Icon name="arrow-right" size={16} className="text-slate-400" />
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 flex overflow-hidden">
                                        {/* Axe Y (Importance) */}
                                        <div className="w-8 flex flex-col items-center justify-between py-2 relative shrink-0">
                                            <div className="absolute top-0 bottom-0 w-px bg-slate-200 left-1/2 -translate-x-1/2"></div>
                                            
                                            <div className="z-10 bg-white pb-2 flex flex-col items-center gap-8 w-full">
                                                <Icon name="arrow-up" size={16} className="text-slate-400" />
                                                <div className="h-24 flex items-center justify-center">
                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400 -rotate-90 whitespace-nowrap">Très important</span>
                                                </div>
                                            </div>
                                            
                                            <div className="z-10 bg-white pt-2 flex flex-col items-center w-full">
                                                <div className="h-24 flex items-center justify-center">
                                                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400 -rotate-90 whitespace-nowrap">Moins important</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Grille 2x2 */}
                                        <div className="flex-1 grid grid-cols-2 grid-rows-2 gap-4 h-full pl-2">
                                            {[
                                                { u: true, i: true, label: "Q1 • À RÉALISER", bg: "bg-rose-50 border-rose-100", accent: "text-rose-600" },
                                                { u: false, i: true, label: "Q2 • À PLANIFIER", bg: "bg-blue-50 border-blue-100", accent: "text-blue-600" },
                                                { u: true, i: false, label: "Q3 • À DÉLÉGUER", bg: "bg-amber-50 border-amber-100", accent: "text-amber-600" },
                                                { u: false, i: false, label: "Q4 • À ÉLIMINER", bg: "bg-slate-100 border-slate-200", accent: "text-slate-500" }
                                            ].map((q, idx) => {
                                                const quadrantTasks = tasks.filter(t => t.urgent === q.u && t.important === q.i && t.classified).sort((a, b) => a.order - b.order);
                                                return (
                                                    <div 
                                                        key={idx}
                                                        onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drop-target'); }}
                                                        onDragLeave={(e) => e.currentTarget.classList.remove('drop-target')}
                                                        onDrop={(e) => { e.currentTarget.classList.remove('drop-target'); onDropOnQuadrant(q.u, q.i); }}
                                                        className={`flex flex-col p-4 rounded-[2rem] border-2 transition-all overflow-hidden ${q.bg}`}
                                                    >
                                                        <div className="mb-2">
                                                            <h4 className={`text-[11px] font-black uppercase ${q.accent}`}>{q.label}</h4>
                                                        </div>
                                                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-1">
                                                            {quadrantTasks.map(t => <TaskCard key={t.id} task={t} showPriority={true} />)}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. PLANIFIER */}
                        {currentStep === 'plan' && (
                            <div className="h-full flex flex-col overflow-hidden bg-white animate-in fade-in">
                                <div className="shrink-0 p-4 border-b border-slate-100 bg-slate-50/30">
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="flex items-center gap-2">
                                            <h3 className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Tâches priorisées (Glisser vers le jour)</h3>
                                            <button onClick={() => setHelpModal('plan')} className="text-blue-600 bg-blue-50 p-1 rounded-full hover:bg-blue-100 transition-colors" title="Aide">
                                                <Icon name="info" size={12} />
                                            </button>
                                        </div>
                                        <span className="text-[8px] px-2 py-0.5 bg-slate-200 rounded-full font-bold">{backlogTasks.length}</span>
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                        {backlogTasks.map(t => (
                                            <div key={t.id} className={`flex items-stretch rounded-2xl border-2 transition-all shadow-sm ${draggedTaskId === t.id ? 'ring-2 ring-blue-400 scale-105 active-task-ring' : ''} ${getTaskColor(t)}`}>
                                                <button 
                                                    draggable
                                                    onDragStart={() => onDragStart(t.id)}
                                                    onClick={() => setDraggedTaskId(draggedTaskId === t.id ? null : t.id)} 
                                                    className="px-4 py-2.5 text-[10px] font-black shrink-0 flex items-center gap-1.5"
                                                >
                                                    {t.isDaily && <Icon name="repeat" size={12} className="opacity-60" />}
                                                    {t.title}
                                                </button>
                                                {/* Bouton rapide "Toute la semaine" pour les tâches quotidiennes */}
                                                {t.isDaily && (
                                                    <div className="flex items-center border-l border-current border-opacity-20">
                                                        <button 
                                                            onClick={() => planTask(t.id, 'all')} 
                                                            className="px-3 h-full hover:bg-black hover:bg-opacity-5 transition-colors"
                                                            title="Planifier toute la semaine"
                                                        >
                                                            <Icon name="calendar-plus" size={14} />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex gap-1 px-4 py-3 shrink-0 overflow-x-auto no-scrollbar bg-white border-b border-slate-50">
                                    {days.map((d, i) => (
                                        <button key={d} onClick={() => setActiveDay(i)} className={`px-5 py-2.5 rounded-full text-[10px] font-black shrink-0 transition-all ${activeDay === i ? 'bg-[#005B63] text-white shadow-lg' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                            {d}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex-1 p-6 overflow-hidden flex flex-col">
                                    <div 
                                        onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('drop-target'); }}
                                        onDragLeave={(e) => e.currentTarget.classList.remove('drop-target')}
                                        onDrop={(e) => { e.currentTarget.classList.remove('drop-target'); draggedTaskId && planTask(draggedTaskId, activeDay); }}
                                        onClick={() => draggedTaskId && planTask(draggedTaskId, activeDay)}
                                        className={`flex-1 flex flex-col p-6 rounded-[3rem] border-2 transition-all overflow-hidden ${draggedTaskId ? 'bg-blue-50/50 border-blue-300 border-dashed ring-4 ring-blue-50' : 'bg-slate-50 border-slate-100 shadow-inner'}`}
                                    >
                                        <div className="flex justify-between items-center mb-6">
                                            <h4 className="text-xl font-black font-nunito text-slate-800 tracking-tight uppercase">
                                                Plan du {days[activeDay]}
                                            </h4>
                                            <Icon name="calendar-check" size={24} className="text-slate-300" />
                                        </div>

                                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-3">
                                            {tasks.filter(t => t.days.includes(activeDay)).sort((a, b) => a.order - b.order).map(t => (
                                                <div key={t.id} className={`p-4 border rounded-2xl shadow-sm text-xs font-black flex justify-between items-center animate-in slide-in-from-top-2 ${getTaskColor(t)}`}>
                                                    <span className="truncate pr-4 uppercase tracking-tight flex items-center gap-2">
                                                        {t.isDaily && <Icon name="repeat" size={14} className="opacity-60" />}
                                                        {t.title}
                                                    </span>
                                                    <button onClick={(e) => {e.stopPropagation(); removeTaskFromDay(t.id, activeDay)}} className="text-current opacity-40 hover:opacity-100">
                                                        <Icon name="x-circle" size={18} />
                                                    </button>
                                                </div>
                                            ))}
                                            {tasks.filter(t => t.days.includes(activeDay)).length === 0 && (
                                                <div className="h-full flex flex-col items-center justify-center opacity-20 text-slate-400 space-y-4">
                                                    <Icon name="plus-circle" size={48} />
                                                    <p className="text-[10px] font-black uppercase tracking-widest">Déposez une tâche ici</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- MODALE D'AIDE --- */}
                    {helpModal && (
                        <div className="fixed inset-0 z-[250] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col relative">
                                <div className="p-6 sm:p-8 flex flex-col gap-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <h2 className="text-xl font-black text-slate-900 font-nunito flex items-center gap-2">
                                            <Icon name="info" className="text-blue-600" size={24} />
                                            Aide : {helpModal === 'collect' ? 'Identifier' : helpModal === 'prioritize' ? 'Prioriser' : 'Planifier'}
                                        </h2>
                                        <button onClick={() => setHelpModal(null)} className="text-slate-400 hover:text-slate-800 bg-slate-100 p-2 rounded-full"><Icon name="x" size={18} /></button>
                                    </div>
                                    
                                    <div className="text-sm text-slate-600 leading-relaxed space-y-4">
                                        {helpModal === 'collect' && (
                                            <>
                                                <p>Cette étape sert de <strong>"vide-cerveau"</strong>. Notez-y absolument toutes les tâches qui vous encombrent l'esprit avant de les organiser.</p>
                                                <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 flex items-start gap-3">
                                                    <Icon name="repeat" size={18} className="text-blue-600 mt-0.5 shrink-0" />
                                                    <p><strong>Tâches quotidiennes :</strong> Cliquez sur cette icône avant d'ajouter une tâche. Elle vous permettra de la planifier facilement sur plusieurs jours de la semaine lors de l'étape 3.</p>
                                                </div>
                                            </>
                                        )}
                                        
                                        {helpModal === 'prioritize' && (
                                            <>
                                                <p>Utilisez la <strong>Matrice d'Eisenhower</strong> pour évaluer chaque tâche, en les glissant dans le quadrant approprié :</p>
                                                <ul className="space-y-3">
                                                    <li className="flex gap-2 items-start"><strong className="text-rose-600 w-8 shrink-0">Q1 :</strong> <span><strong>À RÉALISER</strong> (Important et Urgent). À faire vous-même immédiatement.</span></li>
                                                    <li className="flex gap-2 items-start"><strong className="text-blue-600 w-8 shrink-0">Q2 :</strong> <span><strong>À PLANIFIER</strong> (Important mais Non Urgent). À caler dans votre agenda.</span></li>
                                                    <li className="flex gap-2 items-start"><strong className="text-amber-600 w-8 shrink-0">Q3 :</strong> <span><strong>À DÉLÉGUER</strong> (Urgent mais Non Important). À confier à quelqu'un d'autre.</span></li>
                                                    <li className="flex gap-2 items-start"><strong className="text-slate-500 w-8 shrink-0">Q4 :</strong> <span><strong>À ÉLIMINER</strong> (Ni Important, ni Urgent). À abandonner.</span></li>
                                                </ul>
                                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 mt-2">
                                                    <p className="text-xs text-slate-500"><strong>Astuce :</strong> Au sein d'un quadrant, réorganisez l'ordre de priorité des tâches en les glissant l'une sur l'autre.</p>
                                                </div>
                                            </>
                                        )}
                                        
                                        {helpModal === 'plan' && (
                                            <>
                                                <p>C'est ici que vous structurez votre semaine. Seules les tâches stratégiques (Q1 et Q2) apparaissent en haut, prêtes à être placées.</p>
                                                <ul className="list-disc pl-5 space-y-2 mb-2">
                                                    <li>Sélectionnez un jour en cliquant sur son nom.</li>
                                                    <li>Faites glisser une tâche depuis le bandeau supérieur vers la zone du jour pour la planifier.</li>
                                                </ul>
                                                <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 flex items-start gap-3 mt-4">
                                                    <Icon name="calendar-plus" size={18} className="text-blue-600 mt-0.5 shrink-0" />
                                                    <p><strong>Tâches quotidiennes :</strong> Cliquez sur cette icône (visible sur les tâches quotidiennes du bandeau) pour les affecter instantanément du Lundi au Vendredi.</p>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                    
                                    <button 
                                        onClick={() => setHelpModal(null)} 
                                        className="w-full mt-4 py-3.5 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-black uppercase tracking-widest text-xs transition-colors shadow-lg"
                                    >
                                        Fermer
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODALE DE BIENVENUE (Prévention Sauvegarde) --- */}
                    {showWelcomeModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-300">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col relative">
                                {/* Barre de décoration bleue */}
                                <div className="h-2 bg-blue-600 w-full shrink-0"></div>
                                
                                <div className="p-6 sm:p-8 flex flex-col gap-6">
                                    {/* En-tête */}
                                    <div className="flex flex-col items-center text-center gap-3">
                                        <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                                            <Icon name="shield-check" size={32} />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-900 leading-tight">Bienvenue dans l'application Kiho gestion du temps</h2>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-2">Confidentialité & Sauvegarde</p>
                                        </div>
                                    </div>

                                    {/* Encadré d'alerte */}
                                    <div className="bg-orange-50 rounded-2xl p-5 flex flex-col gap-3">
                                        <div className="flex items-center gap-2 text-orange-600">
                                            <Icon name="alert-triangle" size={20} />
                                            <h3 className="font-black uppercase tracking-wide text-sm">Important</h3>
                                        </div>
                                        <p className="text-sm text-orange-900 leading-relaxed">
                                            <strong>Si vous actualisez la page, changez de navigateur ou fermez cet onglet, vos données seront perdues.</strong>
                                            <br/><br/>
                                            Pensez à exporter régulièrement votre travail à l'aide du bouton Sauvegarder présent dans le menu <Icon name="menu" size={14} className="inline align-middle mx-1 text-slate-500" /> situé en haut à droite de l'application.
                                        </p>
                                        {/* Faux bouton visuel */}
                                        <div className="mt-2 inline-flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-700 shadow-sm self-start">
                                            <Icon name="download" size={14} className="text-blue-600" />
                                            Sauvegarder (.json)
                                        </div>
                                    </div>

                                    {/* Bouton d'action */}
                                    <button 
                                        onClick={() => setShowWelcomeModal(false)}
                                        className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-sm uppercase tracking-widest transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20 mt-2"
                                    >
                                        <Icon name="check" size={18} />
                                        J'ai compris
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
